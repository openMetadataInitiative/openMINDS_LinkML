id: https://openminds.om-i.org/schemas/latest/stimulation?format=linkml
name: openMINDS-stimulation
title: OpenMINDS stimulation module, version "v4.0"
description: Schemas for the stimulation module of the openMINDS metadata framework,
  version "v4.0"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- EphysStimulus:
    class_uri: https://openminds.om-i.org/types/EphysStimulus
    description: null
    title: Ephys stimulus
    slots:
    - id
    - deliveredBy
    - description
    - epoch
    - generatedBy
    - internalIdentifier
    - lookupLabel
    - specification
    - type
    slot_usage:
      internalIdentifier:
        required: true
      specification:
        range: Configuration
      type:
        range: ElectricalStimulusType
- StimulationActivity:
    class_uri: https://openminds.om-i.org/types/StimulationActivity
    description: null
    title: Stimulation activity
    slots:
    - id
    - customPropertySet
    - description
    - endTime
    - input
    - isPartOf
    - lookupLabel
    - output
    - performedBy
    - preparationDesign
    - protocol
    - setup
    - startTime
    - stimulus
    - studyTarget
    slot_usage:
      endTime:
        range: string
        any_of:
        - range: time
      input:
        required: true
        range: SubjectGroupState
      isPartOf:
        required: true
        range: DatasetVersion
      output:
        required: true
        range: File
      performedBy:
        range: SoftwareAgent
      protocol:
        required: true
      startTime:
        range: string
        any_of:
        - range: time
      stimulus:
        required: true
      studyTarget:
        range: AuditoryStimulusType
