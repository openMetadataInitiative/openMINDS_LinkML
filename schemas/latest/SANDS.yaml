    - inspiredBy
    - internalIdentifier
    - laterality
    - preferredVisualization
    - specification
    - type
    slot_usage:
      coordinateFramework:
        required: true
      criteriaQualityType:
        required: true
      criteriaType:
        required: true
      specification:
        any_of:
        - range: File
        - range: PropertyValueList
      type:
        required: true
        range: AnnotationType
- CustomAnatomicalEntity:
    class_uri: https://openminds.om-i.org/types/CustomAnatomicalEntity
    description: null
    title: Custom anatomical entity
    slots:
    - id
    - hasAnnotation
    - name
    - relatedInterspeciesAnatomy
    - relationAssessment
    slot_usage:
      hasAnnotation:
        range: CustomAnnotation
      name:
        required: true
      relatedInterspeciesAnatomy:
        any_of:
        - range: AnatomicalCavity
        - range: ExternalBodyRegion
        - range: MuscularStructure
        - range: NervousSystemStructure
        - range: Organ
        - range: OrganSystemStructure
        - range: OrganismSubstance
        - range: OrganismSystem
        - range: SkeletalStructure
        - range: TissueStructure
        - range: VascularStructure
      relationAssessment:
        range: QualitativeRelationAssessment
- CustomCoordinateFramework:
