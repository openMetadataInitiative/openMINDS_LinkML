id: https://openminds.om-i.org/schemas/latest/SANDS?format=linkml
name: openMINDS-SANDS
title: OpenMINDS SANDS module, version "latest"
description: Schemas for the SANDS module of the openMINDS metadata framework, version
  "latest"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- AtlasAnnotation:
    class_uri: https://openminds.om-i.org/types/AtlasAnnotation
    description: null
    title: Atlas annotation
    slots:
    - id
    - criteria
    - criteriaQualityType
    - criteriaType
    - inspiredBy
    - internalIdentifier
    - laterality
    - preferredVisualization
    - specification
    - type
    slot_usage:
      criteriaQualityType:
        required: true
      criteriaType:
        required: true
      specification:
        range: File
      type:
        required: true
        range: AnnotationType
- CommonCoordinateFrameworkVersion:
    class_uri: https://openminds.om-i.org/types/CommonCoordinateFrameworkVersion
    description: null
    title: Common coordinate framework version
    slots:
    - id
    - abbreviation
    - accessibility
    - anatomicalAxesOrientation
    - axesOrigin
    - contribution
    - contributorAffiliation
    - copyright
    - defaultImage
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - funding
    - homepage
    - howToCite
    - isPrecededBy
    - isVariantOf
    - isVersionOf
    - keyword
    - nativeUnit
    - ontologyIdentifier
    - publicationStatus
    - relatedPublication
    - releaseDate
    - repository
    - shortName
    - supportChannel
    - usageCondition
    - usedSpecimen
    - versionIdentifier
    - versionSpecification
    slot_usage:
      accessibility:
        required: true
      anatomicalAxesOrientation:
        required: true
      axesOrigin:
        required: true
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: ISBN
        - range: RRID
      documentation:
        required: true
      fullName:
        required: true
      howToCite:
        required: true
      isPrecededBy:
        range: CommonCoordinateFrameworkVersion
      isVariantOf:
        range: CommonCoordinateFrameworkVersion
      isVersionOf:
        required: true
        range: CommonCoordinateFramework
      keyword:
        range: AccessChannel
      nativeUnit:
        required: true
      relatedPublication:
        range: DOI
      releaseDate:
        required: true
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
      usageCondition:
        range: License
      usedSpecimen:
        range: Subject
      versionIdentifier:
        required: true
      versionSpecification:
        required: true
- ParcellationTerminologyVersion:
    class_uri: https://openminds.om-i.org/types/ParcellationTerminologyVersion
    description: null
    title: Parcellation terminology version
    slots:
    - id
    - dataLocation
    - digitalIdentifier
    - hasEntity
    - ontologyIdentifier
    slot_usage:
      dataLocation:
        range: File
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: ISBN
        - range: RRID
      hasEntity:
        required: true
        range: ParcellationEntityVersion
- AnatomicalAtlas:
