        - range: uri
      usedTaxon:
        required: true
        any_of:
        - range: BiologicalOrder
        - range: Species
- AnatomicalAtlasVersion:
    class_uri: https://openminds.om-i.org/types/AnatomicalAtlasVersion
    description: null
    title: Anatomical atlas version
    slots:
    - id
    - abbreviation
    - accessibility
    - contribution
    - contributorAffiliation
    - coordinateFramework
    - copyright
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - funding
    - hasTerminology
    - homepage
    - howToCite
    - isPrecededBy
    - isVariantOf
    - isVersionOf
    - keyword
    - majorVersionIdentifier
    - ontologyIdentifier
    - publicationStatus
    - relatedPublication
    - releaseDate
    - repository
    - shortName
    - supportChannel
    - type
    - usageCondition
    - usedSpecimen
    - versionIdentifier
    - versionSpecification
    slot_usage:
      accessibility:
        required: true
      contribution:
        required: true
        range: Contribution
      coordinateFramework:
        range: CommonCoordinateFrameworkVersion
      description:
        required: true
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: ISBN
        - range: RRID
      documentation:
        required: true
      fullName:
        required: true
      hasTerminology:
        required: true
        range: ParcellationTerminologyVersion
      howToCite:
        required: true
      isPrecededBy:
        range: AnatomicalAtlasVersion
      isVariantOf:
        range: AnatomicalAtlasVersion
      isVersionOf:
        required: true
        range: AnatomicalAtlas
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      releaseDate:
        required: true
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
      type:
        required: true
        range: AtlasType
      usageCondition:
        range: License
      usedSpecimen:
        range: Subject
      versionIdentifier:
        required: true
      versionSpecification:
        required: true
