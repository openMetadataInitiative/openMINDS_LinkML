id: https://openminds.om-i.org/schemas/latest/neuroimaging?format=linkml
name: openMINDS-neuroimaging
title: OpenMINDS neuroimaging module, version "latest"
description: Schemas for the neuroimaging module of the openMINDS metadata framework,
  version "latest"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- DynamicMRIAcquisition:
    class_uri: https://openminds.om-i.org/types/DynamicMRIAcquisition
    description: null
    title: Dynamic mriacquisition
    slots:
    - id
    - behavioralProtocol
    - contrastAgent
    - customPropertySet
    - delayTime
    - description
    - device
    - distortionCorrection
    - endTime
    - input
    - isPartOf
    - lookupLabel
    - motionCorrection
    - numberOfDiscardedVolumes
    - output
    - performedBy
    - preparationDesign
    - protocol
    - registrationData
    - specimenOrientation
    - startTime
    - studyTarget
    - targetAnatomy
    - volumeAcquisitionTime
    - volumeTiming
    slot_usage:
      behavioralProtocol:
        required: true
      device:
        required: true
        range: MRIScannerUsage
      endTime:
        range: string
        any_of:
        - range: time
      input:
        required: true
        range: SubjectState
      isPartOf:
        required: true
        range: DatasetVersion
      output:
        required: true
        range: File
      performedBy:
        range: SoftwareAgent
      protocol:
        required: true
        range: Protocol
      specimenOrientation:
        required: true
      startTime:
        range: string
        any_of:
        - range: time
      studyTarget:
        range: AnatomicalCavity
      targetAnatomy:
        any_of:
        - range: AnatomicalCavity
        - range: CellType
        - range: ExternalBodyRegion
        - range: MuscularStructure
        - range: NervousSystemStructure
        - range: Organ
        - range: OrganSystemStructure
        - range: OrganismSubstance
        - range: OrganismSystem
        - range: SkeletalStructure
        - range: SubcellularEntity
        - range: TissueStructure
        - range: VascularStructure
        - range: CustomAnatomicalEntity
        - range: ParcellationEntity
        - range: ParcellationEntityVersion
      volumeAcquisitionTime:
        required: true
- StaticMRIAcquisition:
    class_uri: https://openminds.om-i.org/types/StaticMRIAcquisition
    description: null
    title: Static mriacquisition
    slots:
    - id
    - contrastAgent
    - customPropertySet
    - description
    - device
    - distortionCorrection
    - endTime
    - input
    - isPartOf
    - lookupLabel
    - motionCorrection
    - output
    - performedBy
    - preparationDesign
    - protocol
    - registrationData
    - specimenOrientation
    - startTime
    - studyTarget
    - targetAnatomy
    slot_usage:
      device:
        required: true
        range: MRIScannerUsage
      endTime:
        range: string
        any_of:
        - range: time
      input:
        required: true
        range: SubjectState
      isPartOf:
        required: true
        range: DatasetVersion
      output:
        required: true
        range: File
      performedBy:
        range: SoftwareAgent
      protocol:
        required: true
        range: Protocol
      specimenOrientation:
        required: true
      startTime:
        range: string
        any_of:
        - range: time
      studyTarget:
        range: AnatomicalCavity
      targetAnatomy:
        any_of:
        - range: AnatomicalCavity
        - range: CellType
        - range: ExternalBodyRegion
        - range: MuscularStructure
        - range: NervousSystemStructure
        - range: Organ
        - range: OrganSystemStructure
        - range: OrganismSubstance
        - range: OrganismSystem
        - range: SkeletalStructure
        - range: SubcellularEntity
        - range: TissueStructure
        - range: VascularStructure
        - range: CustomAnatomicalEntity
        - range: ParcellationEntity
        - range: ParcellationEntityVersion
- MRIScannerUsage:
    class_uri: https://openminds.om-i.org/types/MRIScannerUsage
    description: null
    title: Mriscanner usage
    slots:
    - id
    - MRIWeighting
    - MTPulseShape
    - accelerationFactor
    - device
    - diffusionEncodingParameters
    - dwellTime
    - echoTime
    - fatSuppressionTechnique
    - fieldOfView
    - flipAngle
    - gradientCorrection
    - inversionTime
    - lookupLabel
    - matrixSize
    - metadataLocation
    - numberOfDiscardedVolumes
    - numberOfExcitations
    - numberOfSlices
    - parallelAcquisitionTechnique
    - phaseEncodingDirection
    - receiverBandwidth
    - repetitionTime
    - sliceAngulation
    - sliceGap
    - sliceOrientation
    - sliceThickness
    - sliceTiming
    - spatialEncoding
    - spoilingTechnique
    - totalReadOutTime
    - transmitterBandwidth
    - usedCoils
    - usedSpecimen
    - voxelSize
    slot_usage:
      device:
        required: true
        range: MRIScanner
      echoTime:
        required: true
      metadataLocation:
        range: File
      repetitionTime:
        required: true
      sliceGap:
        any_of:
        - range: QuantitativeValue
        - range: QuantitativeValueRange
      sliceThickness:
        any_of:
        - range: QuantitativeValue
        - range: QuantitativeValueRange
      sliceTiming:
        required: true
      usedCoils:
        range: DeviceType
      usedSpecimen:
        any_of:
        - range: SubjectState
        - range: TissueSampleState
      voxelSize:
        range: QuantitativeValueArray
- MRIScanner:
    class_uri: https://openminds.om-i.org/types/MRIScanner
    description: null
    title: Mriscanner
    slots:
    - id
    - contribution
    - description
    - internalIdentifier
    - magneticFieldStrength
    - name
    - serialNumber
    - type
    slot_usage:
      contribution:
        required: true
        range: Organization
      magneticFieldStrength:
        required: true
      name:
        required: true
      type:
        required: true
        any_of:
        - range: DeviceType
        - range: HardwareProduct
- MRICoilUsage:
    class_uri: https://openminds.om-i.org/types/MRICoilUsage
    description: null
    title: Mricoil usage
    slots:
    - id
    - activeElement
    - device
    - lookupLabel
    - metadataLocation
    - mountingLocation
    - signalDirectionality
    - usedSpecimen
    slot_usage:
      device:
        required: true
        range: MRICoil
      metadataLocation:
        range: File
      signalDirectionality:
        required: true
      usedSpecimen:
        any_of:
        - range: SubjectState
        - range: TissueSampleState
- MRICoil:
    class_uri: https://openminds.om-i.org/types/MRICoil
    description: null
    title: Mricoil
    slots:
    - id
    - contribution
    - description
    - elementCount
    - intendedMountingLocation
    - internalIdentifier
    - mountingType
    - name
    - serialNumber
    - type
    slot_usage:
      contribution:
        required: true
        range: Organization
      elementCount:
        required: true
      mountingType:
        required: true
      name:
        required: true
      type:
        required: true
        any_of:
        - range: DeviceType
        - range: HardwareProduct
