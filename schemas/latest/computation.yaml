    title: Optimization
    slots:
    - id
    - customPropertySet
    - description
    - endTime
    - environment
    - input
    - launchConfiguration
    - lookupLabel
    - output
    - performedBy
    - recipe
    - resourceUsage
    - startTime
    - startedBy
    - status
    - studyTarget
    - tag
    - technique
    - wasInformedBy
    slot_usage:
      endTime:
        range: string
        any_of:
        - range: time
      environment:
        required: true
        any_of:
        - range: Environment
        - range: Service
      input:
        required: true
        range: LocalFile
      output:
        required: true
        range: LocalFile
      performedBy:
        range: SoftwareAgent
      resourceUsage:
        range: QuantitativeValue
      startTime:
        required: true
        range: string
        any_of:
        - range: time
      studyTarget:
        range: AnatomicalCavity
      technique:
        range: AnalysisTechnique
      wasInformedBy:
        any_of:
        - range: DataAnalysis
        - range: DataCopy
        - range: GenericComputation
        - range: ModelValidation
        - range: Optimization
        - range: Simulation
        - range: Visualization
