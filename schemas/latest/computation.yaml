    - accessibility
    - entryPoint
    - interface
    slot_usage:
      accessibility:
        required: true
      entryPoint:
        required: true
        range: WebResource
      interface:
        required: true
- Environment:
    class_uri: https://openminds.om-i.org/types/Environment
    description: Structured information on the computer system or set of systems in
      which a computation is deployed and executed.
    title: Environment
    slots:
    - id
    - configuration
    - description
    - hardware
    - name
    - software
    slot_usage:
      configuration:
        range: Configuration
      hardware:
        required: true
      name:
        required: true
