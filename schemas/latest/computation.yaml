id: https://openminds.om-i.org/schemas/latest/computation?format=linkml
name: openMINDS-computation
title: OpenMINDS computation module, version "latest"
description: Schemas for the computation module of the openMINDS metadata framework,
  version "latest"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- WorkflowRecipe:
    class_uri: https://openminds.om-i.org/types/WorkflowRecipe
    description: Structured information about the description of a prospective workflow.
    title: Workflow recipe
    slots:
    - id
    - contribution
    - contributorAffiliation
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - homepage
    - howToCite
    - keyword
    - relatedPublication
    - shortName
    - supportChannel
    slot_usage:
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        range: DOI
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
- HardwareSystem:
    class_uri: https://openminds.om-i.org/types/HardwareSystem
    description: Structured information about computing hardware.
    title: Hardware system
    slots:
    - id
    - description
    - name
    - versionIdentifier
    slot_usage:
      name:
        required: true
- WorkflowRecipeVersion:
    class_uri: https://openminds.om-i.org/types/WorkflowRecipeVersion
    description: Structured information about a specific implemented version of a
      workflow recipe.
    title: Workflow recipe version
    slots:
    - id
    - accessibility
    - contribution
    - contributorAffiliation
    - copyright
    - description
    - digitalIdentifier
    - documentation
    - format
    - fullName
    - funding
    - hasPart
    - homepage
    - howToCite
    - isPrecededBy
    - isVariantOf
    - isVersionOf
    - keyword
    - publicationStatus
    - relatedPublication
    - releaseDate
    - repository
    - shortName
    - supportChannel
    - usageCondition
    - versionIdentifier
    - versionSpecification
    slot_usage:
      accessibility:
        required: true
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        range: DOI
      documentation:
        required: true
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      format:
        required: true
      fullName:
        required: true
      hasPart:
        range: WorkflowRecipeVersion
      isPrecededBy:
        range: WorkflowRecipeVersion
      isVariantOf:
        range: WorkflowRecipeVersion
      isVersionOf:
        required: true
        range: WorkflowRecipe
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      releaseDate:
        required: true
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
      usageCondition:
        range: License
      versionIdentifier:
        required: true
      versionSpecification:
        required: true
- DataCopy:
    class_uri: https://openminds.om-i.org/types/DataCopy
    description: null
    title: Data copy
    slots:
    - id
    - customPropertySet
    - description
    - endTime
    - environment
    - input
    - launchConfiguration
    - lookupLabel
    - output
    - performedBy
    - recipe
    - resourceUsage
    - startTime
    - startedBy
    - status
    - studyTarget
    - tag
    - technique
    - wasInformedBy
    slot_usage:
      endTime:
        range: string
        any_of:
        - range: time
      environment:
        required: true
        any_of:
        - range: Environment
        - range: Service
      input:
        required: true
        range: LocalFile
      output:
        required: true
        range: LocalFile
      performedBy:
        range: SoftwareAgent
      resourceUsage:
        range: QuantitativeValue
      startTime:
        required: true
        range: string
        any_of:
        - range: time
      studyTarget:
        range: AnatomicalCavity
      technique:
        range: AnalysisTechnique
      wasInformedBy:
        any_of:
        - range: DataAnalysis
        - range: DataCopy
        - range: GenericComputation
        - range: ModelValidation
        - range: Optimization
        - range: Simulation
        - range: Visualization
- WorkflowExecution:
    class_uri: https://openminds.om-i.org/types/WorkflowExecution
    description: Structured information about an execution of a computational workflow.
    title: Workflow execution
    slots:
    - id
    - configuration
    - recipe
    - stage
    - startedBy
    slot_usage:
      configuration:
        any_of:
        - range: Configuration
        - range: File
      stage:
        required: true
        range: DataAnalysis
- ServiceDeployment:
    class_uri: https://openminds.om-i.org/types/ServiceDeployment
    description: null
    title: Service deployment
    slots:
    - id
    - dependsOn
    - deploymentType
    - endTime
    - name
    - provides
    - service
    - startTime
    - uses
    slot_usage:
      dependsOn:
        range: WorkflowRecipeVersion
      endTime:
        range: datetime
      name:
        required: true
      provides:
        required: true
      service:
        required: true
        range: Service
      startTime:
        required: true
        range: datetime
      uses:
        range: WorkflowRecipeVersion
- ValidationTest:
    class_uri: https://openminds.om-i.org/types/ValidationTest
    description: Structured information about the definition of a process for validating
      a computational model.
    title: Validation test
    slots:
    - id
    - contribution
    - contributorAffiliation
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - homepage
    - howToCite
    - keyword
    - referenceDataAcquisition
    - relatedPublication
    - scope
    - scoreType
    - shortName
    - studyTarget
    - supportChannel
    slot_usage:
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        range: DOI
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      scope:
        range: ModelScope
      shortName:
        required: true
      studyTarget:
        range: AnatomicalCavity
      supportChannel:
        range: string
        any_of:
        - range: uri
- LaunchConfiguration:
    class_uri: https://openminds.om-i.org/types/LaunchConfiguration
    description: Structured information about the launch of a computational process.
    title: Launch configuration
    slots:
    - id
    - argument
    - description
    - environmentVariable
    - executable
    - name
    slot_usage:
      executable:
        required: true
- Optimization:
    class_uri: https://openminds.om-i.org/types/Optimization
    description: Structured information about a process of optimizing a model or a
