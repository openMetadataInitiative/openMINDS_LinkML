    any_of:
    - range: QuantitativeValue
    - range: QuantitativeValueArray
    inlined: true
    multivalued: true
  wasInformedBy:
    slot_uri: wasInformedBy
    description: null
    any_of:
    - range: Visualization
    - range: Simulation
    - range: ModelValidation
    - range: Optimization
    - range: DataCopy
    - range: GenericComputation
    - range: DataAnalysis
  webpage:
    slot_uri: webpage
    description: Hypertext document (block of information) found on the World Wide
      Web.
    multivalued: true
    range: uri
    list_elements_unique: true
  weight:
    slot_uri: weight
    description: Amount that a thing or being weighs.
    any_of:
    - range: SpecimenWeight
    - range: QuantitativeValue
