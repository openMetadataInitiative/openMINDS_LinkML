enums:
  PaymentModelType:
    enum_uri: https://openminds.om-i.org/types/PaymentModelType
    title: Payment model type
    permissible_values:
      retainer payment model:
        description: Time-recurring payment reserves dedicated capacity units (e.g.,
          staff hours, server instances, support slots).
      fixed-recurring payment model:
        description: Time-recurring payment grants shared access, independent of billable
          units (entitlement, consumption, event, monetary value, outcome, or capacity
          units).
      allowance-overage payment model:
        description: Payment includes an allowance of billable units (entitlement,
          consumption, event, monetary value, outcome, or capacity units), with charges
          for excess units.
      performance-based payment model:
        description: Payment is triggered by achievement of defined outcome units
          (e.g., qualified leads, completed projects, conversions, performance targets).
      single-payment model:
        description: Payment is made once for access, independent of any billable
          units (entitlement, consumption, event, monetary value, outcome, or capacity
          units).
      zero-cost payment model:
        description: No payment is required for any billable units (entitlement, consumption,
          event, monetary value, outcome, or capacity units).
      revenue-split payment model:
        description: Payment is determined by dividing aggregated monetary value among
          participating parties according to predefined shares.
      unit-based payment model:
        description: Payment is based on allocated entitlement units (e.g., users,
          licenses, devices, seats).
      take-rate payment model:
        description: Payment is calculated as a fixed percentage of the monetary value
          of each user transaction, so the user pays more when transaction amounts
          increase and less when they decrease.
      transaction-based payment model:
        description: Payment is based on counted event units (e.g., processing operations,
          message deliveries, document generations).
      consumption-based payment model:
        description: Payment is based on measured consumption units (e.g., data volume,
          compute time, storage space, network bandwidth).
      step-pricing payment model:
        description: Payment is determined by predefined thresholds of billable units
          (entitlement, consumption, event, monetary value, outcome, or capacity units).
