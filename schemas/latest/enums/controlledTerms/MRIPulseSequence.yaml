enums:
  MRIPulseSequence:
    enum_uri: https://openminds.om-i.org/types/MRIPulseSequence
    title: Mripulse sequence
    permissible_values:
      gradient-echo pulse sequence:
        description: In magnetic resonance imaging, a 'gradient-echo pulse sequence'
          is a contrast generation technique that rapidly induces bulk changes in
          the spin magnetization of a sample by applying a series of carefully constructed
          pulses so that the change in the gradient of the magnetic field is maximized,
          trading contrast for speed (cf. [Hargreaves (2012)](https://doi.org/10.1002/jmri.23742)).
      echo planar pulse sequence:
        description: In magnetic resonance imaging, an 'echo-planar pulse sequence'
          is a contrasting technique where each radio frequency field (RF) excitation
          is followed by a train of gradient echoes with different spatial encoding
          allowing for very rapid scanning. [adapted from [wikipedia](https://en.wikipedia.org/wiki/Physics_of_magnetic_resonance_imaging#Echo-planar_imaging)]
      fast low angle shot pulse sequence:
        description: A gradient echo pulse sequence that combines a low-flip angle
          radio-frequency excitation of the nuclear magnetic resonance signal (recorded
          as a spatially encoded gradient echo) with a short repetition time. [adapted
          from [Wikipedia](https://en.wikipedia.org/wiki/Fast_low_angle_shot_magnetic_resonance_imaging)]
      fluid attenuated inversion recovery pulse sequence:
        description: A special inversion recovery pulse sequence where the inversion
          time is adjusted such that at equilibrium there is no net transverse magnetization
          of fluid in order to null the signal from fluid in the resulting image.
      spin echo pulse sequence:
        description: In magnetic resonance imaging, a 'spin echo pulse sequence' is
          a contrast generation technique that induces bulk changes in the spin magnetization
          of a sample by applying sequential pulses of resonant electromagnetic waves
          at different angles (cf. [Fonseca (2013)](https://doi.org/10.5772/53693)).
      magnetization transfer pulse sequence:
        description: A combination of two radiofrequency pulses, the first off-resonance,
          the second in resonance with the Larmor frequency of free-water protons.
