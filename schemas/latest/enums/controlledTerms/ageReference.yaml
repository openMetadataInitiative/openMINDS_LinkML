enums:
  AgeReference:
    enum_uri: https://openminds.om-i.org/types/AgeReference
    title: Age reference
    permissible_values:
      birth:
        description: An age reference point defined by the complete expulsion or extraction
          of the developing offspring from the gestational parent, marking the end
          of gestation and the beginning of postnatal development.
      fertilization:
        description: Age reference point characterized by the fusion of male and female
          gametes resulting in the formation of a zygote.
      death:
        description: Age reference point characterized by the irreversible cessation
          of all vital biological functions sustaining an organism.
      first day of the last menstrual period:
        description: Age reference point characterized by the onset of the most recent
          menstrual bleeding cycle prior to conception, used clinically as a proxy
          reference for estimating gestational age.
