enums:
  MRISpoilingTechnique:
    enum_uri: https://openminds.om-i.org/types/MRISpoilingTechnique
    title: Mrispoiling technique
    permissible_values:
      radiofrequency spoiling:
        description: A spoiling technique that suppresses residual transverse magnetization
          by applying controlled phase cycling to successive radiofrequency excitation
          pulses.
      gradient spoiling:
        description: A spoiling technique that suppresses residual transverse magnetization
          by applying additional gradient moments to induce spatial dephasing.
      combined spoiling:
        description: A spoiling technique that suppresses residual transverse magnetization
          by combining radiofrequency phase cycling with gradient-induced spatial
          dephasing.
