    title: Access eligibility type
    permissible_values:
      controlled access:
        description: Access limited to registered and/or authenticated users meeting
          defined eligibility criteria.
      open access:
        description: Access without prior registration, authentication, or authorisation.
      restricted access:
        description: Access limited to authenticated and specifically authorised users
          meeting enhanced legal, ethical, contractual, or governance requirements.
