default_prefix: omi
enums:
  ModificationForm:
    enum_uri: https://openminds.om-i.org/types/ModificationForm
    title: Modification form
    permissible_values:
      registered modification:
        description: Modification becomes effective upon registration in an official
          public or regulatory registry.
      physically signed modification:
        description: Modification is executed by physical signatures of the required
          parties.
      directed modification:
        description: Modification is issued through a formal contractual or operational
          change directive.
      notarized modification:
        description: Modification is authenticated by a licensed notary or equivalent
          public officer.
      electronically signed modification:
        description: Modification is executed using legally recognized electronic
          signature systems.
      board approved modification:
        description: Modification is approved through a formal resolution of the governing
          body.
