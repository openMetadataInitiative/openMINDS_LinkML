enums:
  AccessProcessType:
    enum_uri: https://openminds.om-i.org/types/AccessProcessType
    title: Access process type
    permissible_values:
      registered access:
        description: Access requires registration but no authentication.
      immediate access:
        description: Automatic access upon acceptance of the applicable terms.
      authorized access:
        description: Access granted following an explicit authorisation decision based
          on assessment of the access request and, where applicable, acceptance or
          negotiation of relevant usage conditions.
      authenticated access:
        description: Access following authentication through an account.
