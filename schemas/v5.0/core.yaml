id: https://openminds.om-i.org/schemas/latest/core?format=linkml
name: openMINDS-core
title: OpenMINDS core module, version "v5.0"
description: Schemas for the core module of the openMINDS metadata framework, version
  "v5.0"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- AccountInformation:
    class_uri: https://openminds.om-i.org/types/AccountInformation
    description: Structured information about a user account for a web service.
    title: Account information
    slots:
    - id
    - service
    - userName
    slot_usage:
      service:
        required: true
        range: Service
      userName:
        required: true
- Organization:
    class_uri: https://openminds.om-i.org/types/Organization
    description: An entity comprised of one or more natural persons with a particular
      purpose. [adapted from Wikipedia](https://en.wikipedia.org/wiki/Organization)
    title: Organization
    slots:
    - id
    - acronym
    - alternateName
    - countryOfFormation
    - digitalIdentifier
    - hasParent
    - homepage
    - jurisdiction
    - location
    - membership
    - name
    - type
    slot_usage:
      countryOfFormation:
        required: true
      digitalIdentifier:
        range: GenericIdentifier
      hasParent:
        range: Organization
      location:
        range: Location
      name:
        required: true
      type:
        required: true
        range: OrganizationType
- Contribution:
    class_uri: https://openminds.om-i.org/types/Contribution
    description: Structured information on the contribution made to a research product.
    title: Contribution
    slots:
    - id
    - contributor
    - type
    slot_usage:
      contributor:
        required: true
        range: Consortium
      type:
        required: true
        range: ContributionType
- ContactInformation:
    class_uri: https://openminds.om-i.org/types/ContactInformation
    description: Structured information about how to contact a given person or consortium.
    title: Contact information
    slots:
    - id
    - email
    slot_usage:
      email:
        required: true
- Affiliation:
    class_uri: https://openminds.om-i.org/types/Affiliation
    description: Structured information about a relationship between two entities,
      such as a person and their employer.
    title: Affiliation
    slots:
    - id
    - organization
    - person
    slot_usage:
      organization:
        required: true
      person:
        required: true
- Consortium:
    class_uri: https://openminds.om-i.org/types/Consortium
    description: Structured information about an association of two or more persons
      or organizations, with the objective of participating in a common activity.
    title: Consortium
    slots:
    - id
    - contactInformation
    - fullName
    - homepage
    - memberships
    - shortName
    slot_usage:
      fullName:
        required: true
      memberships:
        required: true
- Person:
    class_uri: https://openminds.om-i.org/types/Person
    description: Structured information on a person.
    title: Person
    slots:
    - id
    - alternateName
    - associatedAccount
    - contactInformation
    - digitalIdentifier
    - familyName
    - givenName
    - preferredName
    slot_usage:
      digitalIdentifier:
        range: GenericIdentifier
      preferredName:
        required: true
- SubjectGroup:
    class_uri: https://openminds.om-i.org/types/SubjectGroup
    description: null
    title: Subject group
    slots:
    - id
    - additionalRemarks
    - biologicalSex
    - internalIdentifier
    - isPartOf
    - lookupLabel
    - numberOfSubjects
    - species
    - studiedState
    slot_usage:
      isPartOf:
        range: SubjectGroup
      numberOfSubjects:
        required: true
      species:
        required: true
        range: Species
      studiedState:
        required: true
        range: SubjectGroupState
- Strain:
    class_uri: https://openminds.om-i.org/types/Strain
    description: null
    title: Strain
    slots:
    - id
    - alternateIdentifier
    - backgroundStrain
    - breedingType
    - description
    - digitalIdentifier
    - diseaseModel
    - geneticStrainType
    - laboratoryCode
    - name
    - ontologyIdentifier
    - phenotype
    - species
    - stockNumber
    - synonym
    slot_usage:
      digitalIdentifier:
        range: RRID
      diseaseModel:
        range: Disease
      geneticStrainType:
        required: true
      name:
        required: true
      species:
        required: true
        range: Species
- Protocol:
    class_uri: https://openminds.om-i.org/types/Protocol
    description: Structured information on a research project.
    title: Protocol
    slots:
    - id
    - describedIn
    - description
    - name
    - stimulusType
    - technique
    slot_usage:
      describedIn:
        any_of:
        - range: DOI
        - range: File
        - range: WebResource
      description:
        required: true
      name:
        required: true
      stimulusType:
        range: AuditoryStimulusType
      technique:
        required: true
        range: AnalysisTechnique
- Subject:
    class_uri: https://openminds.om-i.org/types/Subject
    description: Structured information on a subject.
    title: Subject
    slots:
    - id
    - biologicalSex
    - internalIdentifier
    - isPartOf
    - lookupLabel
    - species
    - studiedState
    slot_usage:
      isPartOf:
        range: SubjectGroup
      species:
        required: true
        any_of:
        - range: Species
        - range: Strain
      studiedState:
        required: true
        range: SubjectState
- TissueSampleCollectionState:
    class_uri: https://openminds.om-i.org/types/TissueSampleCollectionState
    description: null
    title: Tissue sample collection state
    slots:
    - id
    - additionalRemarks
    - age
    - associatedProtocol
    - attribute
    - descendedFrom
    - internalIdentifier
    - lookupLabel
    - pathology
    - relativeTimeIndication
    - weight
    slot_usage:
      age:
        range: SpecimenAge
      associatedProtocol:
        range: Protocol
      attribute:
        range: TissueSampleAttribute
      descendedFrom:
        range: SubjectGroupState
      pathology:
        range: Disease
      weight:
        range: SpecimenWeight
- SubjectGroupState:
    class_uri: https://openminds.om-i.org/types/SubjectGroupState
    description: null
    title: Subject group state
    slots:
    - id
    - additionalRemarks
    - age
    - ageCategory
    - associatedProtocol
    - attribute
    - descendedFrom
    - handedness
    - internalIdentifier
    - lookupLabel
    - pathology
    - relativeTimeIndication
    - weight
    slot_usage:
      age:
        range: SpecimenAge
      ageCategory:
        required: true
      associatedProtocol:
        range: Protocol
      attribute:
        range: SubjectAttribute
      descendedFrom:
        range: SubjectGroupState
      pathology:
        range: Disease
      weight:
        range: SpecimenWeight
- TissueSample:
    class_uri: https://openminds.om-i.org/types/TissueSample
    description: Structured information on a tissue sample.
    title: Tissue sample
    slots:
    - id
    - anatomicalLocation
    - biologicalSex
    - internalIdentifier
    - isPartOf
    - laterality
    - lookupLabel
    - origin
    - species
    - studiedState
    - type
    slot_usage:
      anatomicalLocation:
        range: AnatomicalCavity
      isPartOf:
        range: TissueSampleCollection
      origin:
        required: true
        any_of:
        - range: CellType
        - range: Organ
        - range: OrganismSubstance
      species:
        required: true
        any_of:
        - range: Species
        - range: Strain
      studiedState:
        required: true
        range: TissueSampleState
      type:
        required: true
        range: TissueSampleType
- TissueSampleState:
    class_uri: https://openminds.om-i.org/types/TissueSampleState
    description: Structured information on a temporary state of a tissue sample.
    title: Tissue sample state
    slots:
    - id
    - additionalRemarks
    - age
    - associatedProtocol
    - attribute
    - descendedFrom
    - internalIdentifier
    - lookupLabel
    - pathology
    - relativeTimeIndication
    - weight
    slot_usage:
      age:
        range: SpecimenAge
      associatedProtocol:
        range: Protocol
      attribute:
        range: TissueSampleAttribute
      descendedFrom:
        range: SubjectGroupState
      pathology:
        range: Disease
      weight:
        range: SpecimenWeight
- CustomPropertySet:
    class_uri: https://openminds.om-i.org/types/CustomPropertySet
    description: Structured information about properties of an entity that are not
      represented in an openMINDS schema.
    title: Custom property set
    slots:
    - id
    - context
    - dataLocation
    - relevantFor
    slot_usage:
      context:
        required: true
      dataLocation:
        required: true
        any_of:
        - range: Configuration
        - range: File
        - range: PropertyValueList
      relevantFor:
        required: true
        any_of:
        - range: AnalysisTechnique
        - range: MRIFatSuppressionTechnique
        - range: MRIParallelAcquisitionTechnique
        - range: MRIPulseSequence
        - range: MRISpoilingTechnique
        - range: MRIWeighting
        - range: SpatialEncoding
        - range: StimulationApproach
        - range: StimulationTechnique
        - range: Technique
- Configuration:
    class_uri: https://openminds.om-i.org/types/Configuration
    description: Structured information about the properties or parameters of an entity
      or process.
    title: Configuration
    slots:
    - id
    - configuration
    - format
    - lookupLabel
    slot_usage:
      configuration:
        required: true
        range: string
      format:
        required: true
- SpecimenAge:
    class_uri: https://openminds.om-i.org/types/SpecimenAge
    description: null
    title: Specimen age
    slots:
    - id
    - age
    - reference
    slot_usage:
      age:
        required: true
        any_of:
        - range: QuantitativeValue
        - range: QuantitativeValueRange
      reference:
        required: true
- SubjectState:
    class_uri: https://openminds.om-i.org/types/SubjectState
    description: Structured information on a temporary state of a subject.
    title: Subject state
    slots:
    - id
    - additionalRemarks
    - age
    - ageCategory
    - associatedProtocol
    - attribute
    - descendedFrom
    - handedness
    - internalIdentifier
    - lookupLabel
    - pathology
    - relativeTimeIndication
    - weight
    slot_usage:
      age:
        range: SpecimenAge
      ageCategory:
        required: true
      associatedProtocol:
        range: Protocol
      attribute:
        range: SubjectAttribute
      descendedFrom:
        range: SubjectState
      pathology:
        range: Disease
      weight:
        range: SpecimenWeight
- PropertyValueList:
    class_uri: https://openminds.om-i.org/types/PropertyValueList
    description: An identifiable list of property-value pairs.
    title: Property value list
    slots:
    - id
    - lookupLabel
    - propertyValuePair
    slot_usage:
      propertyValuePair:
        required: true
        range: NumericalProperty
- SpecimenWeight:
    class_uri: https://openminds.om-i.org/types/SpecimenWeight
    description: null
    title: Specimen weight
    slots:
    - id
    - type
    - weight
    slot_usage:
      type:
        required: true
        range: WeightType
      weight:
        required: true
        any_of:
        - range: QuantitativeValue
        - range: QuantitativeValueRange
- BehavioralProtocol:
    class_uri: https://openminds.om-i.org/types/BehavioralProtocol
    description: Structured information about a protocol used in an experiment studying
      human or animal behavior.
    title: Behavioral protocol
    slots:
    - id
    - describedIn
    - description
    - internalIdentifier
    - name
    - stimulation
    - stimulusType
    slot_usage:
      describedIn:
        range: DOI
      description:
        required: true
      name:
        required: true
      stimulation:
        range: StimulationApproach
      stimulusType:
        range: AuditoryStimulusType
- StringProperty:
    class_uri: https://openminds.om-i.org/types/StringProperty
    description: null
    title: String property
    slots:
    - id
    - externalDefinitionOfName
    - name
    - value
    slot_usage:
      name:
        required: true
      value:
        required: true
        range: string
- NumericalProperty:
    class_uri: https://openminds.om-i.org/types/NumericalProperty
    description: Structured information about a property of some entity or process
      whose value is a number.
    title: Numerical property
    slots:
    - id
    - externalDefinitionOfName
    - name
    - value
    slot_usage:
      name:
        required: true
      value:
        required: true
        range: QuantitativeValue
- ProtocolExecution:
    class_uri: https://openminds.om-i.org/types/ProtocolExecution
    description: Structured information on a protocol execution.
    title: Protocol execution
    slots:
    - id
    - behavioralProtocol
    - customPropertySet
    - description
    - endTime
    - input
    - isPartOf
    - lookupLabel
    - output
    - performedBy
    - preparationDesign
    - protocol
    - startTime
    - studyTarget
    slot_usage:
      endTime:
        range: string
        any_of:
        - range: time
      input:
        required: true
        range: File
      isPartOf:
        required: true
        range: DatasetVersion
      output:
        required: true
        range: File
      performedBy:
        range: SoftwareAgent
      protocol:
        required: true
        range: Protocol
      startTime:
        range: string
        any_of:
        - range: time
      studyTarget:
        range: AnatomicalCavity
- TissueSampleCollection:
    class_uri: https://openminds.om-i.org/types/TissueSampleCollection
    description: null
    title: Tissue sample collection
    slots:
    - id
    - additionalRemarks
    - anatomicalLocation
    - biologicalSex
    - internalIdentifier
    - isPartOf
    - laterality
    - lookupLabel
    - numberOfTissueSamples
    - origin
    - species
    - studiedState
    - type
    slot_usage:
      anatomicalLocation:
        range: AnatomicalCavity
      isPartOf:
        range: TissueSampleCollection
      origin:
        required: true
        range: CellType
      species:
        required: true
        range: Species
      studiedState:
        required: true
        range: TissueSampleCollectionState
      type:
        required: true
        range: TissueSampleType
- Dependency:
    class_uri: https://openminds.om-i.org/types/Dependency
    description: null
    title: Dependency
    slots:
    - id
    - failureImpact
    - fulfilledBy
    slot_usage:
      fulfilledBy:
        required: true
        any_of:
        - range: Configuration
        - range: File
        - range: InterfaceVersion
        - range: SoftwareVersion
        - range: WebResource
- Location:
    class_uri: https://openminds.om-i.org/types/Location
    description: null
    title: Location
    slots:
    - id
    - address
    - country
    - geoCoordinates
    slot_usage:
      country:
        required: true
- Accessibility:
    class_uri: https://openminds.om-i.org/types/Accessibility
    description: null
    title: Accessibility
    slots:
    - id
    - channel
    - eligibility
    - form
    - paymentModel
    - process
    slot_usage:
      channel:
        required: true
      eligibility:
        required: true
      form:
        required: true
      paymentModel:
        required: true
      process:
        required: true
- QuantitativeValueArray:
    class_uri: https://openminds.om-i.org/types/QuantitativeValueArray
    description: A representation of an array of quantitative values, optionally with
      uncertainties.
    title: Quantitative value array
    slots:
    - id
    - negativeUncertainties
    - positiveUncertainties
    - typeOfUncertainty
    - unit
    - values
    slot_usage:
      values:
        required: true
- Funding:
    class_uri: https://openminds.om-i.org/types/Funding
    description: Structured information on used funding.
    title: Funding
    slots:
    - id
    - acknowledgement
    - awardNumber
    - awardTitle
    - funder
    slot_usage:
      funder:
        required: true
        any_of:
        - range: Organization
        - range: Person
- WebResource:
    class_uri: https://openminds.om-i.org/types/WebResource
    description: null
    title: Web resource
    slots:
    - id
    - IRI
    - contentDescription
    - format
    slot_usage:
      IRI:
        required: true
- QuantitativeValue:
    class_uri: https://openminds.om-i.org/types/QuantitativeValue
    description: Structured information on a quantitative value.
    title: Quantitative value
    slots:
    - id
    - typeOfUncertainty
    - uncertainty
    - unit
    - value
    slot_usage:
      value:
        required: true
        any_of:
        - range: integer
        - range: float
- Membership:
    class_uri: https://openminds.om-i.org/types/Membership
    description: null
    title: Membership
    slots:
    - id
    - endDate
    - member
    - startDate
    slot_usage:
      member:
        required: true
        any_of:
        - range: Consortium
        - range: Organization
        - range: Person
- Comment:
    class_uri: https://openminds.om-i.org/types/Comment
    description: Structured information about a short text expressing an opinion on,
      or giving information about some entity.
    title: Comment
    slots:
    - id
    - about
    - comment
    - commenter
    - timestamp
    slot_usage:
      about:
        required: true
        any_of:
        - range: ValidationTest
        - range: ValidationTestVersion
        - range: WorkflowRecipe
        - range: WorkflowRecipeVersion
        - range: Dataset
        - range: DatasetVersion
        - range: Interface
        - range: InterfaceVersion
        - range: MetaDataModel
        - range: MetaDataModelVersion
        - range: Model
        - range: ModelVersion
        - range: Software
        - range: SoftwareVersion
        - range: LivePaper
        - range: LivePaperVersion
        - range: AnatomicalAtlas
        - range: AnatomicalAtlasVersion
        - range: CommonCoordinateFramework
        - range: CommonCoordinateFrameworkVersion
      comment:
        required: true
      commenter:
        required: true
      timestamp:
        required: true
- ResearchProductGroup:
    class_uri: https://openminds.om-i.org/types/ResearchProductGroup
    description: null
    title: Research product group
    slots:
    - id
    - context
    - hasPart
    slot_usage:
      context:
        required: true
      hasPart:
        required: true
        range: ValidationTest
- GeoCoordinates:
    class_uri: https://openminds.om-i.org/types/GeoCoordinates
    description: null
    title: Geo coordinates
    slots:
    - id
    - elevation
    - latitude
    - longitude
    slot_usage:
      latitude:
        required: true
      longitude:
        required: true
- QuantitativeValueRange:
    class_uri: https://openminds.om-i.org/types/QuantitativeValueRange
    description: A representation of a range of quantitative values.
    title: Quantitative value range
    slots:
    - id
    - maxValue
    - maxValueUnit
    - minValue
    - minValueUnit
    slot_usage:
      maxValue:
        required: true
      minValue:
        required: true
- Dataset:
    class_uri: https://openminds.om-i.org/types/Dataset
    description: Structured information on data originating from human/animal studies
      or simulations (concept level).
    title: Dataset
    slots:
    - id
    - contribution
    - contributorAffiliation
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - homepage
    - howToCite
    - keyword
    - relatedPublication
    - shortName
    - supportChannel
    slot_usage:
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: GenericIdentifier
        - range: IdentifiersDotOrgID
        - range: RRID
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
- ModelVersion:
    class_uri: https://openminds.om-i.org/types/ModelVersion
    description: Structured information on a computational model (version level).
    title: Model version
    slots:
    - id
    - accessibility
    - configuration
    - contribution
    - contributorAffiliation
    - copyright
    - description
    - digitalIdentifier
    - documentation
    - entryPoint
    - format
    - fullName
    - funding
    - homepage
    - howToCite
    - inputData
    - isPrecededBy
    - isVariantOf
    - isVersionOf
    - keyword
    - outputData
    - publicationStatus
    - relatedPublication
    - releaseDate
    - repository
    - shortName
    - supportChannel
    - usageCondition
    - versionIdentifier
    - versionSpecification
    slot_usage:
      accessibility:
        required: true
      configuration:
        any_of:
        - range: Configuration
        - range: File
        - range: PropertyValueList
        - range: WebResource
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: GenericIdentifier
        - range: RRID
        - range: SWHID
      documentation:
        required: true
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      entryPoint:
        range: string
      format:
        required: true
      fullName:
        required: true
      inputData:
        range: DOI
      isPrecededBy:
        range: ModelVersion
      isVariantOf:
        range: ModelVersion
      isVersionOf:
        required: true
        range: Model
      keyword:
        range: AccessChannel
      outputData:
        range: DOI
      relatedPublication:
        range: DOI
      releaseDate:
        required: true
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
      usageCondition:
        range: License
      versionIdentifier:
        required: true
      versionSpecification:
        required: true
- Project:
    class_uri: https://openminds.om-i.org/types/Project
    description: Structured information on a research project.
    title: Project
    slots:
    - id
    - contribution
    - description
    - fullName
    - hasPart
    - homepage
    - shortName
    - type
    slot_usage:
      contribution:
        range: Contribution
      description:
        required: true
      fullName:
        required: true
      hasPart:
        required: true
        range: ValidationTest
      shortName:
        required: true
      type:
        required: true
        range: ProjectType
- Interface:
    class_uri: https://openminds.om-i.org/types/Interface
    description: null
    title: Interface
    slots:
    - id
    - communicationProtocol
    - contribution
    - contributorAffiliation
    - description
    - documentation
    - fullName
    - homepage
    - howToCite
    - interfaceType
    - keyword
    - relatedPublication
    - shortName
    - supportChannel
    slot_usage:
      communicationProtocol:
        required: true
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      interfaceType:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
- Software:
    class_uri: https://openminds.om-i.org/types/Software
    description: Structured information on a software tool (concept level).
    title: Software
    slots:
    - id
    - contribution
    - contributorAffiliation
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - homepage
    - howToCite
    - keyword
    - relatedPublication
    - shortName
    - supportChannel
    slot_usage:
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: GenericIdentifier
        - range: RRID
        - range: SWHID
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
- Service:
    class_uri: https://openminds.om-i.org/types/Service
    description: null
    title: Service
    slots:
    - id
    - contribution
    - description
    - documentation
    - fullName
