id: https://openminds.om-i.org/schemas/latest/publications?format=linkml
name: openMINDS-publications
title: OpenMINDS publications module, version "v5.0"
description: Schemas for the publications module of the openMINDS metadata framework,
  version "v5.0"
license: https://spdx.org/licenses/MIT.html
imports:
- linkml:types
- slots
- enums
prefixes:
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  omi: https://openminds.om-i.org
default_prefix: omi
classes:
- LivePaper:
    class_uri: https://openminds.om-i.org/types/LivePaper
    description: null
    title: Live paper
    slots:
    - id
    - contribution
    - contributorAffiliation
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - homepage
    - howToCite
    - keyword
    - relatedPublication
    - shortName
    - supportChannel
    slot_usage:
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        range: DOI
      documentation:
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      keyword:
        range: AccessChannel
      relatedPublication:
        range: DOI
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
- LearningResource:
    class_uri: https://openminds.om-i.org/types/LearningResource
    description: null
    title: Learning resource
    slots:
    - id
    - IRI
    - about
    - abstract
    - citedPublication
    - contribution
    - contributorAffiliation
    - copyright
    - creationDate
    - digitalIdentifier
    - educationalLevel
    - funding
    - keyword
    - learningOutcome
    - modificationDate
    - name
    - order
    - prerequisite
    - publicationDate
    - requiredTime
    - topic
    - type
    - usageCondition
    - versionIdentifier
    slot_usage:
      about:
        required: true
        range: ValidationTest
      citedPublication:
        range: DOI
      contribution:
        range: Contribution
      digitalIdentifier:
        range: DOI
      keyword:
        range: AccessChannel
      modificationDate:
        range: date
      name:
        required: true
      publicationDate:
        required: true
      requiredTime:
        any_of:
        - range: QuantitativeValue
        - range: QuantitativeValueRange
      type:
        range: LearningResourceType
      usageCondition:
        range: License
- PublicationIssue:
    class_uri: https://openminds.om-i.org/types/PublicationIssue
    description: null
    title: Publication issue
    slots:
    - id
    - isPartOf
    - issueNumber
    slot_usage:
      isPartOf:
        required: true
        range: PublicationVolume
      issueNumber:
        required: true
- Book:
    class_uri: https://openminds.om-i.org/types/Book
    description: null
    title: Book
    slots:
    - id
    - IRI
    - abstract
    - citedPublication
    - contribution
    - contributorAffiliation
    - copyright
    - creationDate
    - digitalIdentifier
    - funding
    - keyword
    - modificationDate
    - name
    - publicationDate
    - usageCondition
    - versionIdentifier
    slot_usage:
      citedPublication:
        range: DOI
      contribution:
        range: Contribution
      digitalIdentifier:
        any_of:
        - range: DOI
        - range: ISBN
      keyword:
        range: AccessChannel
      modificationDate:
        range: date
      name:
        required: true
      publicationDate:
        required: true
      usageCondition:
        range: License
- LivePaperVersion:
    class_uri: https://openminds.om-i.org/types/LivePaperVersion
    description: null
    title: Live paper version
    slots:
    - id
    - about
    - accessibility
    - contribution
    - contributorAffiliation
    - copyright
    - description
    - digitalIdentifier
    - documentation
    - fullName
    - funding
    - homepage
    - howToCite
    - isPrecededBy
    - isVariantOf
    - isVersionOf
    - keyword
    - modificationDate
    - publicationStatus
    - relatedPublication
    - releaseDate
    - repository
    - shortName
    - supportChannel
    - usageCondition
    - versionIdentifier
    - versionSpecification
    slot_usage:
      about:
        range: DatasetVersion
      accessibility:
        required: true
      contribution:
        required: true
        range: Contribution
      description:
        required: true
      digitalIdentifier:
        required: true
        range: DOI
      documentation:
        required: true
        any_of:
        - range: DOI
        - range: File
        - range: ISBN
        - range: WebResource
      fullName:
        required: true
      isPrecededBy:
        range: LivePaperVersion
      isVariantOf:
        range: LivePaperVersion
      isVersionOf:
        required: true
        range: LivePaper
      keyword:
        range: AccessChannel
      modificationDate:
        range: datetime
      relatedPublication:
        range: DOI
      releaseDate:
        required: true
      shortName:
        required: true
      supportChannel:
        range: string
        any_of:
        - range: uri
      usageCondition:
        required: true
        range: License
      versionIdentifier:
        required: true
      versionSpecification:
        required: true
- Chapter:
    class_uri: https://openminds.om-i.org/types/Chapter
    description: null
    title: Chapter
    slots:
    - id
    - IRI
    - abstract
    - citedPublication
    - contribution
    - contributorAffiliation
    - copyright
    - creationDate
    - digitalIdentifier
    - funding
    - isPartOf
    - keyword
    - modificationDate
    - name
    - pagination
    - publicationDate
    - usageCondition
    - versionIdentifier
    slot_usage:
      citedPublication:
        range: DOI
      contribution:
        required: true
        range: Contribution
      digitalIdentifier:
        range: DOI
      isPartOf:
        required: true
        range: Book
      keyword:
        range: AccessChannel
      modificationDate:
        range: date
      name:
        required: true
      publicationDate:
        required: true
      usageCondition:
        range: License
- Periodical:
    class_uri: https://openminds.om-i.org/types/Periodical
    description: null
    title: Periodical
    slots:
    - id
    - abbreviation
    - digitalIdentifier
    - name
    slot_usage:
      digitalIdentifier:
        range: ISSN
      name:
        required: true
- PublicationVolume:
    class_uri: https://openminds.om-i.org/types/PublicationVolume
    description: null
    title: Publication volume
    slots:
    - id
    - isPartOf
    - volumeNumber
    slot_usage:
      isPartOf:
        required: true
        range: Periodical
      volumeNumber:
        required: true
- LivePaperResourceItem:
    class_uri: https://openminds.om-i.org/types/LivePaperResourceItem
    description: null
    title: Live paper resource item
    slots:
    - id
    - IRI
    - hostedBy
    - isPartOf
    - name
    slot_usage:
      IRI:
        required: true
      hostedBy:
        required: true
        any_of:
        - range: Organization
        - range: Service
        - range: Service
      isPartOf:
        required: true
        range: LivePaperSection
      name:
        required: true
- LivePaperSection:
    class_uri: https://openminds.om-i.org/types/LivePaperSection
    description: null
    title: Live paper section
    slots:
    - id
    - description
    - isPartOf
    - name
    - order
    - type
    slot_usage:
      isPartOf:
        required: true
        range: LivePaperVersion
      name:
        required: true
      order:
        required: true
      type:
        required: true
        range: string
- ScholarlyArticle:
    class_uri: https://openminds.om-i.org/types/ScholarlyArticle
    description: null
    title: Scholarly article
    slots:
    - id
    - IRI
    - abstract
    - citedPublication
    - contribution
    - contributorAffiliation
    - copyright
    - creationDate
    - digitalIdentifier
    - funding
    - isPartOf
    - keyword
    - modificationDate
    - name
    - pagination
    - publicationDate
    - usageCondition
    - versionIdentifier
    slot_usage:
      citedPublication:
        range: DOI
      contribution:
        required: true
        range: Contribution
      digitalIdentifier:
        range: DOI
      isPartOf:
        required: true
        any_of:
        - range: PublicationIssue
        - range: PublicationVolume
      keyword:
        range: AccessChannel
      modificationDate:
        range: date
      name:
        required: true
      publicationDate:
        required: true
      usageCondition:
        range: License
