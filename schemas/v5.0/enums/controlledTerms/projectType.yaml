    title: Project type
    permissible_values:
      grant project:
        description: A time-limited, externally funded project defined primarily by
          the formal objectives, conditions, and reporting requirements of a sponsoring
          organization.
      research project:
        description: A science-driven project defined primarily by a coherent research
          question and systematic investigation aimed at generating new knowledge,
          methods, or insights, regardless of its funding source.
