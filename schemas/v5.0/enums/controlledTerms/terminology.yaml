enums:
  Terminology:
    enum_uri: https://openminds.om-i.org/types/Terminology
    title: Terminology
    permissible_values:
      electrical stimulus type:
        description: An 'electrical stimulus type' groups similar electrical stimuli
          used across electrical stimulation techniques.
      file repository type:
        description: null
      project type:
        description: Terminology characterizing a project according to its primary
          grounding, organizational basis, and driving objectives.
      organism substance:
        description: Terminology defining biological substances produced by or contained
          within an organism.
      programming language:
        description: null
      anatomical plane:
        description: A flat anatomical 2D surface that bisects an anatomical structure
          or an anatomical space.
      age category:
        description: The age category describes a specific spatiotemporal part of
          the life cycle of an organism.
      contribution type:
        description: A functional role characterized by a specific activity or responsibility
          realized by a role-bearing entity in relation to a target entity and its
          life cycle.
      semantic data type:
        description: null
      access form:
        description: Terminology defining the manner in which access to a resource
          is facilitated.
      modification constraint:
        description: Terminology for specifying procedural conditions or prohibitions
          that limit how modifications may be made.
      type of uncertainty:
        description: null
      software application category:
        description: null
      molecular entity:
        description: Any constitutionally or isotopically distinct atom, molecule,
          ion, ion pair, radical, radical ion, complex, conformer etc., identifiable
          as a separately distinguishable entity.
      measured signal type:
        description: The types of biological electrical and non-electrical signals
          that vary in time and/or space and can be measured.
      gustatory stimulus type:
        description: A 'gustatory stimulus type' groups similar gustatory stimuli
          used across gustatory stimulation techniques.
      model scope:
        description: null
      visual stimulus type:
        description: A 'visual stimulus type' groups similar visual stimuli used across
          visual stimulation techniques.
      pulse shape:
        description: A terminology defining the temporal amplitude profiles of excitation,
          stimulation, or modulation pulses based on their mathematical or functional
          form.
      anatomical cavity:
        description: Terminology defining anatomical cavities and internal spaces
          within an organism that contain organs, tissues, or fluids, excluding blood
          and lymph vessels.
      patch clamp variation:
        description: A variation of the patch clamp technique
      MRI fat suppression technique:
        description: "A terminology defining methods for reducing or separating fat\
          \ signal in MRI using spectral, inversion recovery, or water\u2013fat decomposition\
          \ techniques."
      genetic strain type:
        description: The genetic strain type describes the genetic background type
          of a strain.
      breeding type:
        description: The breeding type describes how plants or animals have been sexually
          propagated.
      supranational body:
        description: An institutional entity created by sovereign states to which
          they delegate or pool defined aspects of their governing authority for common
          decision-making that is binding on the member states.
      tissue sample type:
        description: null
      MRI pulse sequence:
        description: An 'MRI pulse sequence' is a particular setting of pulse sequences
          and pulsed field gradients, resulting in a particular image appearance [adapted
          from [Wikipedia](https://en.wikipedia.org/wiki/MRI_pulse_sequence)].
      operating system:
        description: null
      disease:
        description: null
      educational level:
        description: 'An ''educational level'' defines the developmental stage of
          a student and how learning environments are structured. '
      tissue sample attribute:
        description: null
      organization type:
        description: Terminology for classifying an organization based on its legal
          status or position within a larger entity.
      model abstraction level:
        description: null
      learning resource type:
        description: A 'learning resource type' groups persistent resources that explicitly
          entail learning activities or learning experiences in a certain format (e.g.,
          in a physical or digital presentation).
      olfactory stimulus type:
        description: An 'olfactory stimulus type' groups similar olfactory stimuli
          used across olfactory stimulation techniques.
      (meta)data model type:
        description: null
      analysis technique:
        description: null
      auditory stimulus type:
        description: An 'auditory stimulus type' groups similar auditory stimuli used
          across auditory stimulation techniques.
      modification consent requirement:
        description: Terminology for specifying whose agreement is required for a
          contract modification to be legally valid.
      stimulation technique:
        description: null
      qualitative overlap:
        description: null
      biological order:
        description: null
      cell type:
        description: null
      skeletal structure:
        description: Terminology defining anatomical structures that form part of
          the skeletal system.
      atlas type:
        description: null
      access eligibility type:
        description: The terminology defining access eligibility type specifies whether
          a resource is openly available to anyone, requires authentication, or authorization.
      operating device:
        description: null
      organism system:
        description: Terminology defining biological systems composed of multiple
          interacting anatomical structures that together perform a major physiological
          function.
      age reference:
        description: "A terminology concept denoting a biologically or clinically\
          \ defined boundary event used to anchor the measurement or interpretation\
          \ of age in relation to an organism\u2019s life cycle."
      experimental approach:
        description: null
      chemicalMixtureType:
        description: A 'chemical mixture type' groups all mixtures with the same chemical
          and physical characteristics under a general term.
      weight type:
        description: A terminology that specifies the biological or processing state
          of a specimen at the time its mass was measured.
      spatial encoding:
        description: A terminology defining methods for representing spatial position
          in signals through frequency-, phase-, or combined encoding mechanisms across
          one or more dimensions.
      modification scope:
        description: Terminology for specifying which parts or aspects of an agreement
          may be modified.
      subcellular entity:
        description: Entity derived from a cell or cells. The anatomical scale of
          these objects roughly corresponds to that which would be visible in high
          resolution light microscopy or conventional electron microscopy, e.g., nanometers
          to microns
      criteria quality type:
        description: null
      MRI weighting:
        description: Class of imaging techniques where the image contrast is generated
          from a specific intrinsic tissue parameter (T1, T2, etc.).
      species:
        description: null
      stimulation approach:
        description: null
      MRI spoiling technique:
        description: A terminology defining methods for suppressing residual transverse
          magnetization in MRI through radiofrequency, gradient, or combined spoiling
          mechanisms.
      handedness:
        description: null
      tissue structure:
        description: Terminology defining anatomical structures composed of integumentary
          or connective tissues that form protective coverings, structural support,
          or separating boundaries within an organism.
      biological sex:
        description: null
      anatomical identification type:
        description: The type of identiciation that was used to determine an anatomical
          location.
      subject attribute:
        description: null
      setup type:
        description: The setup type describes the overall purpose of arranging equipment
          in a certain way (setup).
      file bundle grouping:
        description: null
      access channel:
        description: Terminology defining the location or medium through which a resource
          can be accessed.
      nervous system structure:
        description: Terminology defining anatomical structures that are components
          of the nervous system.
      software feature:
        description: null
      cranial window reinforcement type:
        description: The reinforcement type of a cranial window.
      optical stimulus type:
        description: An 'optical stimulus type' groups similar optical stimuli used
          across optical stimulation techniques.
      sovereign state:
        description: A political entity that possesses supreme governing authority
          within a defined territory and is not legally subordinate to another state.
      publication status:
        description: Terminology defining the status of a resource in the publication
          lifecycle.
      action status type:
        description: null
      disease model:
        description: null
      modification form:
        description: Terminology for specifying the formal method by which consent
          to a modification must be expressed.
      file usage role:
        description: null
      difference measure:
        description: A measure of the difference between two things
      access process type:
        description: Terminology defining the workflow or mechanism through which
          access to a resource is granted.
      annotation type:
        description: Geometrical classification of annotations into types.
      organ:
        description: Terminology defining whole anatomical organs that function as
          discrete structural and functional units within an organism.
      data type:
        description: null
      tactile stimulus type:
        description: A 'tactile stimulus type' groups similar tactile stimuli used
          across tactile stimulation techniques.
      external body region:
        description: "Terminology defining anatomical regions located on the external\
          \ surface of an organism\u2019s body."
      cranial window construction type:
        description: The construction type of a cranial window.
      language:
        description: null
      preparation type:
        description: null
      cell culture type:
        description: The type of a cell culture (e.g. primary, secondary)
      technique:
        description: null
      unit of measurement:
        description: null
      payment model type:
        description: Terminology defining the pricing structure or financial model
          associated with accessing a resource.
      muscular structure:
        description: Terminology defining anatomical structures composed primarily
          of muscle tissue that contribute to body movement or internal mechanical
          function.
      annotation criteria type:
        description: General classification of how data were annotated.
      MR spatial encoding:
        description: MR spatial encoding type defines the method by which imaging
          data is collected, determining the spatial encoding strategy and affecting
          resolution, scan time, and overall image quality.
      organ system structure:
        description: Terminology defining anatomical components and structural parts
          that belong to or form part of an organ system.
      colormap:
        description: A colormap is a lookup table specifying the colors to be used
          in rendering a palettized image, [adapted from [Wiktionary](https://en.wiktionary.org/wiki/colormap)].
      vascular structure:
        description: Terminology defining anatomical structures that form the circulatory
          vessel networks responsible for transporting blood or lymph within an organism.
      device type:
        description: null
      anatomical axes orientation:
        description: null
      laterality:
        description: null
      device mounting type:
        description: A terminology defining methods for mechanically attaching devices
          based on structural integration, compliance, and geometric conformity to
          the host structure.
      measured quantity:
        description: A qualified physical quantity that was measured/recorded
