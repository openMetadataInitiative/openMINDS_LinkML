enums:
  MeasuredSignalType:
    enum_uri: https://openminds.ebrains.eu/controlledTerms/MeasuredSignalType
    title: Measured signal type
    permissible_values:
      beta activity:
        description: A neural oscillation in the mid frequency range (typically between
          12-30 Hz) arising from synchronous and coherent electrical activity in the
          brain. [adapted from [Wikipedia](https://en.wikipedia.org/wiki/Beta_wave)]
      gamma activity:
        description: A neural oscillation in the high frequency range (typically between
          30-150 Hz) arising from synchronous and coherent electrical activity in
          the brain. [adapted from [Wikipedia](https://en.wikipedia.org/wiki/Gamma_wave)]
      alpha activity:
        description: A neural oscillation in the low frequency range (typically between
          8-12 Hz) arising from synchronous and coherent electrical activity in the
          brain. [adapted from [Wikipedia](https://en.wikipedia.org/wiki/Alpha_wave)]
